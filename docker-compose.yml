# New-API Docker Compose Configuration (本地构建 + MySQL + Redis)
#
# Quick Start:
#   1. docker-compose up -d
#   2. Access at http://localhost:3000
#
# ⚠️  IMPORTANT: Change all default passwords before deploying to production!

version: '3.4'

services:
  new-api:
    image: new-api:v2
    build:
      context: .
      dockerfile: Dockerfile
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=root:BIE122318bie.@tcp(mysql:3306)/new-api
      - REDIS_CONN_STRING=redis://redis:6379
      - SESSION_SECRET=t2nPmYK6dLcttPBc
      - TZ=Asia/Shanghai
    depends_on:
      - redis
      - mysql
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - new-api-network

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    networks:
      - new-api-network

  mysql:
    image: mysql:8.2
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: BIE122318bie.
      MYSQL_DATABASE: new-api
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - new-api-network

volumes:
  mysql_data:

networks:
  new-api-network:
    driver: bridge
